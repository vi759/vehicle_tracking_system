{% extends "layout.html" %}

{% block title %}Vehicle Exit - VTS{% endblock %}

{% block content %}
<div class="header">
    <div>
        <h1 class="page-title"><i class="fas fa-right-from-bracket"></i> Vehicle Exit</h1>
        <p class="page-subtitle">Enter the vehicle number to record its exit from the premises.</p>
    </div>
</div>

<div class="card" style="max-width: 600px;">

    <form action="/vehicle_exit" method="POST">

        <div class="form-group">
            <label><i class="fas fa-hashtag" style="color: var(--primary); margin-right: 6px;"></i>Vehicle Number</label>
            <input type="text" name="vehicle_number" placeholder="Enter vehicle number to exit..." required>
        </div>

        <div style="margin-top: 2rem; display: flex; gap: 1rem; align-items: center;">
            <button type="submit" class="btn btn-danger">
                <i class="fas fa-arrow-right-from-bracket"></i> Record Exit
            </button>
            <a href="/admin_dashboard" class="btn btn-outline">
                <i class="fas fa-arrow-left"></i> Back
            </a>
        </div>

    </form>

</div>
{% endblock %}
