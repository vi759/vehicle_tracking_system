<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Vehicle Tracking System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/modern.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="login-page">

    <div class="login-card">
        <div class="login-header">
            <div class="login-icon">🚗</div>
            <h1 class="login-title">Welcome Back</h1>
            <p class="login-subtitle">Sign in to Vehicle Tracking System</p>
        </div>

        <form action="/login" method="POST">
            <div class="form-group">
                <label><i class="fas fa-user" style="color: var(--primary); margin-right: 6px;"></i>Username</label>
                <input type="text" name="username" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-lock" style="color: var(--primary); margin-right: 6px;"></i>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top: 0.5rem;">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem; color: var(--text-light); font-size: 0.85rem;">
            <i class="fas fa-shield-alt"></i> Secure Admin Access
        </div>
    </div>

</body>

</html>
