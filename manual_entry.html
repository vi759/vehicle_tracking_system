{% extends "layout.html" %}

{% block title %}Manual Entry - VTS{% endblock %}

{% block content %}
<div class="header">
    <div>
        <h1 class="page-title"><i class="fas fa-pen-to-square"></i> Manual Vehicle Entry</h1>
        <p class="page-subtitle">Enter vehicle details manually to record a new entry.</p>
    </div>
</div>

<div class="card" style="max-width: 600px;">

    <form action="/manual_entry" method="POST">

        <div class="form-group">
            <label><i class="fas fa-hashtag" style="color: var(--primary); margin-right: 6px;"></i>Vehicle Number</label>
            <input type="text" name="vehicle_number" placeholder="e.g. AB12CD3456" required>
        </div>

        <div class="form-group">
            <label><i class="fas fa-user" style="color: var(--secondary); margin-right: 6px;"></i>Owner Name</label>
            <input type="text" name="owner_name" placeholder="Driver/Owner name" required>
        </div>

        <div class="form-group">
            <label><i class="fas fa-palette" style="color: var(--primary); margin-right: 6px;"></i>Vehicle Color</label>
            <input type="text" name="vehicle_color" placeholder="e.g. Red, White, Black" required>
        </div>

        <div style="margin-top: 2rem; display: flex; gap: 1rem; align-items: center;">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-plus-circle"></i> Record Entry
            </button>
            <a href="/admin_dashboard" class="btn btn-outline">
                <i class="fas fa-arrow-left"></i> Cancel
            </a>
        </div>

    </form>

</div>
{% endblock %}
